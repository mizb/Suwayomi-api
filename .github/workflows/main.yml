name: Build JM API extension

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
      - ".github/workflows/build-extension.yml"
      - "README.md"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout JM API extension source
        uses: actions/checkout@v4

      - name: Checkout Keiyoushi extension build system
        uses: actions/checkout@v4
        with:
          repository: keiyoushi/extensions-source
          path: keiyoushi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Copy extension into Keiyoushi tree
        shell: bash
        run: |
          set -euo pipefail
          rm -rf keiyoushi/src/zh/jmapi
          mkdir -p keiyoushi/src/zh
          cp -R src/zh/jmapi keiyoushi/src/zh/jmapi

      - name: Load only JM API extension
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("keiyoushi/settings.gradle.kts")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "loadAllIndividualExtensions()\n// loadIndividualExtension(\"all\", \"mangadex\")",
              "// loadAllIndividualExtensions()\nloadIndividualExtension(\"zh\", \"jmapi\")",
          )
          path.write_text(text, encoding="utf-8")
          PY

      - name: Configure release signing key
        shell: bash
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -n "${SIGNING_KEYSTORE_BASE64}" ]; then
            echo "${SIGNING_KEYSTORE_BASE64}" | base64 --decode > keiyoushi/signingkey.jks
            echo "Using SIGNING_KEYSTORE_BASE64 for release signing."
          else
            echo "::warning::SIGNING_KEYSTORE_BASE64 is not set. The APK will use a temporary debug signing key."
          fi

      - name: Normalize Kotlin formatting
        working-directory: keiyoushi
        run: ./gradlew :src:zh:jmapi:spotlessApply --stacktrace

      - name: Build release APK
        working-directory: keiyoushi
        env:
          ALIAS: ${{ secrets.ALIAS || 'jmapi' }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :src:zh:jmapi:assembleRelease --stacktrace

      - name: Generate Suwayomi repository files
        id: repo
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t APK_SOURCES < <(find keiyoushi/src/zh/jmapi/build/outputs/apk/release -type f -name '*.apk' -print)
          if [ "${#APK_SOURCES[@]}" -ne 1 ]; then
            echo "assembleRelease must produce exactly one APK; found ${#APK_SOURCES[@]}." >&2
            exit 1
          fi
          APK_SOURCE="${APK_SOURCES[0]}"

          VERSION_CODE="$(grep -E 'versionCode\s*=' src/zh/jmapi/build.gradle.kts | grep -Eo '[0-9]+' | head -n 1)"
          LIB_VERSION="$(grep -E 'libVersion\s*=' src/zh/jmapi/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/' | head -n 1)"
          if ! [[ "${LIB_VERSION}" =~ ^(0|[1-9][0-9]*)(\.(0|[1-9][0-9]*))+$ ]]; then
            echo "LIB_VERSION must use canonical numeric dotted notation; got '${LIB_VERSION}'." >&2
            exit 1
          fi
          if ! [[ "${VERSION_CODE}" =~ ^[1-9][0-9]*$ ]]; then
            echo "VERSION_CODE must be a positive decimal integer; got '${VERSION_CODE}'." >&2
            exit 1
          fi
          VERSION="${LIB_VERSION}.${VERSION_CODE}"
          APK_NAME="tachiyomi-zh.jmapi-v${VERSION}.apk"
          if ! [[ "${APK_NAME}" =~ ^tachiyomi-zh\.jmapi-v[0-9]+(\.[0-9]+)+\.apk$ ]] || \
             [ "$(basename -- "${APK_NAME}")" != "${APK_NAME}" ]; then
            echo "Unsafe APK filename derived from version: '${APK_NAME}'." >&2
            exit 1
          fi
          PACKAGE_NAME="eu.kanade.tachiyomi.extension.zh.jmapi"
          mkdir -p dist/apk dist/icon
          APK_FINAL="dist/apk/${APK_NAME}"
          cp "${APK_SOURCE}" "${APK_FINAL}"
          AAPT2="$(find "${ANDROID_HOME}/build-tools" -type f -name aapt2 | sort -V | tail -n 1)"
          if [ -z "${AAPT2}" ]; then
            echo "Android build-tools aapt2 was not found; APK manifest identity cannot be verified." >&2
            exit 1
          fi
          PACKAGE_LINE="$("${AAPT2}" dump badging "${APK_FINAL}" | grep -E '^package: ' | head -n 1)"
          MANIFEST_PACKAGE="$(sed -n "s/.* name='\([^']*\)'.*/\1/p" <<< "${PACKAGE_LINE}")"
          MANIFEST_VERSION_CODE="$(sed -n "s/.* versionCode='\([^']*\)'.*/\1/p" <<< "${PACKAGE_LINE}")"
          MANIFEST_VERSION_NAME="$(sed -n "s/.* versionName='\([^']*\)'.*/\1/p" <<< "${PACKAGE_LINE}")"
          if [ "${MANIFEST_PACKAGE}" != "${PACKAGE_NAME}" ] || \
             [ "${MANIFEST_VERSION_CODE}" != "${VERSION_CODE}" ] || \
             [ "${MANIFEST_VERSION_NAME}" != "${VERSION}" ]; then
            echo "APK manifest identity does not match build.gradle.kts." >&2
            echo "Expected ${PACKAGE_NAME} ${VERSION_CODE} ${VERSION}; got ${MANIFEST_PACKAGE} ${MANIFEST_VERSION_CODE} ${MANIFEST_VERSION_NAME}." >&2
            exit 1
          fi
          SOURCE_ID="$(python3 - <<'PY'
          import hashlib

          digest = hashlib.md5("jm api/zh/1".encode()).digest()
          value = 0
          for byte in digest[:8]:
              value = (value << 8) | byte
          print(value & 0x7fffffffffffffff)
          PY
          )"
          APKSIGNER="$(find "${ANDROID_HOME}/build-tools" -name apksigner | sort -V | tail -n 1)"
          FINGERPRINT="$("${APKSIGNER}" verify --print-certs "${APK_FINAL}" | awk -F': ' '/certificate SHA-256 digest:/ { fingerprint = $NF; gsub(":", "", fingerprint); print tolower(fingerprint); exit }')"
          if [ -z "${FINGERPRINT}" ]; then
            FINGERPRINT="$(keytool -printcert -jarfile "${APK_FINAL}" | awk '/SHA256:/ { gsub(":", "", $2); print tolower($2); exit }')"
          fi
          if [ -z "${FINGERPRINT}" ]; then
            echo "Could not read APK signing certificate fingerprint." >&2
            exit 1
          fi

          cp src/zh/jmapi/res/mipmap-xxxhdpi/ic_launcher.png "dist/icon/${PACKAGE_NAME}.png"
          touch dist/.nojekyll

          cat > dist/index.min.json <<EOF
          [
            {
              "name": "Tachiyomi: JM API",
              "pkg": "${PACKAGE_NAME}",
              "apk": "${APK_NAME}",
              "lang": "zh",
              "code": ${VERSION_CODE},
              "version": "${VERSION}",
              "nsfw": 1,
              "sources": [
                {
                  "name": "JM API",
                  "lang": "zh",
                  "id": "${SOURCE_ID}",
                  "baseUrl": "http://127.0.0.1:8088"
                }
              ]
            }
          ]
          EOF

          cat > dist/repo.json <<EOF
          {
            "index_v2": null,
            "meta": {
              "name": "JM API Extensions",
              "shortName": "JM API",
              "website": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}",
              "signingKeyFingerprint": "${FINGERPRINT}"
            }
          }
          EOF
          cp dist/index.min.json dist/index.json

          echo "apk-name=${APK_NAME}" >> "${GITHUB_OUTPUT}"
          echo "fingerprint=${FINGERPRINT}" >> "${GITHUB_OUTPUT}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.repo.outputs.apk-name }}
          path: dist/apk/${{ steps.repo.outputs.apk-name }}

      - name: Upload Suwayomi repository artifact
        uses: actions/upload-artifact@v4
        with:
          name: suwayomi-repo
          path: dist/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Publish raw extension repo branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: repo
          publish_dir: dist
          force_orphan: true

  deploy-pages:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
